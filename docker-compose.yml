# Base de données PostgreSQL pour le développement local.
#   docker compose up -d      # démarrer
#   docker compose down       # arrêter
#   docker compose down -v    # arrêter et supprimer les données
#
# L'URL correspondante (déjà par défaut dans .env.example) :
#   postgresql://portfolio:portfolio@localhost:5432/portfolio?schema=public

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:3000"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    name: portfolio-network
    driver: bridge

volumes:
  portfolio_pgdata:
