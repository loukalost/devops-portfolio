name: tests
on:
  workflow_call:

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm run test:run
        env:
          CI: true
          NODE_ENV: test
      
      - name: Test build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          NODE_ENV: production