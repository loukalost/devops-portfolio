name: 🚀 Build and Deploy Portfolio Application

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  registry: ghcr.io
  image_name: ${{ github.repository }}

jobs:
  security:
    uses: ./.github/workflows/security.yml
    secrets: inherit
  
  quality:
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  build-and-push:
    uses: ./.github/workflows/build.yml
    needs: security
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy:
    uses: ./.github/workflows/deploy.yml
    needs: build-and-push
    secrets: inherit
    permissions:
      contents: read
      packages: read